# ------------------------------------------------------------------
# OPCIONAL. O docker-compose padrao usa TUNNEL_TOKEN (.env) e NAO
# precisa deste arquivo. Use este modo (credentials-file) apenas se
# preferir tunel nomeado por arquivo.
#
# Copie para tunnel/config.yml (gitignored), ajuste, e monte no
# container cloudflared trocando o command/volumes no compose para:
#   command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
#   volumes: [ ./tunnel:/etc/cloudflared:ro ]
# ------------------------------------------------------------------

tunnel: <TUNNEL_ID>
credentials-file: /etc/cloudflared/<TUNNEL_ID>.json

ingress:
  - hostname: worklog.seu-dominio.com
    service: http://web:80
  - service: http_status:404
