<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Nexus Worklog</title>
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#1f1f25">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Nexus Worklog">
  <link rel="stylesheet" href="/css/tokens.css?v=2">
  <link rel="stylesheet" href="/css/app.css?v=2">
</head>
<body>
  <!-- Sprite de icones (Material Symbols, apenas os usados). SVG inline e
       permitido pela CSP; nao ha script/style inline. -->
  <svg class="hidden" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
    <symbol id="icon-edit" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></symbol>
    <symbol id="icon-add" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/></symbol>
    <symbol id="icon-check" viewBox="0 0 24 24"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></symbol>
    <symbol id="icon-delete" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></symbol>
    <symbol id="icon-logout" viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></symbol>
    <symbol id="icon-tasks" viewBox="0 0 24 24"><path d="M22 7h-9v2h9V7zm0 8h-9v2h9v-2zM5.54 11 2 7.46l1.41-1.41 2.12 2.12 4.24-4.24 1.41 1.41L5.54 11zm0 8L2 15.46l1.41-1.41 2.12 2.12 4.24-4.24 1.41 1.41L5.54 19z"/></symbol>
    <symbol id="icon-reports" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-8 14H9V9h2v8zm4 0h-2V7h2v10zm-4 0H5v-4h2v4z"/></symbol>
    <symbol id="icon-dashboard" viewBox="0 0 24 24"><path d="M11 2v20c-5.07-.5-9-4.79-9-10s3.93-9.5 9-10zm2.03 0v8.99H22c-.47-4.74-4.24-8.52-8.97-8.99zm0 11.01V22c4.74-.47 8.5-4.25 8.97-8.99h-8.97z"/></symbol>
    <symbol id="icon-admin" viewBox="0 0 24 24"><path d="M12 1 3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1.06 14L7.4 11.46l1.41-1.41 2.12 2.12 4.24-4.24 1.42 1.41L10.94 15z"/></symbol>
    <symbol id="icon-chevron" viewBox="0 0 24 24"><path d="M16.59 8.59 12 13.17 7.41 8.59 6 10l6 6 6-6z"/></symbol>
  </svg>

  <header class="topbar">
    <div class="topbar-brand">
      <img class="brand-logo" src="/img/shadow.svg" alt="Shadow" width="36" height="42">
      <h1>Nexus Worklog</h1>
    </div>

    <nav class="tabs" id="tabs" role="tablist">
      <button role="tab" data-view="board" aria-selected="true" title="Tarefas" aria-label="Tarefas">
        <svg class="inline-icon" viewBox="0 0 24 24"><use href="#icon-tasks"></use></svg>
      </button>
      <button role="tab" data-view="dashboard" aria-selected="false" title="Dashboard" aria-label="Dashboard">
        <svg class="inline-icon" viewBox="0 0 24 24"><use href="#icon-dashboard"></use></svg>
      </button>
      <button role="tab" data-view="reports" aria-selected="false" title="Relatórios" aria-label="Relatórios">
        <svg class="inline-icon" viewBox="0 0 24 24"><use href="#icon-reports"></use></svg>
      </button>
      <button role="tab" data-view="admin" aria-selected="false" id="tab-admin" class="hidden" title="Admin" aria-label="Admin">
        <svg class="inline-icon" viewBox="0 0 24 24"><use href="#icon-admin"></use></svg>
      </button>
    </nav>

    <div class="topbar-actions">
      <span class="who" id="who"></span>
      <button class="icon" id="btn-logout" title="Sair" aria-label="Sair">
        <svg class="inline-icon" viewBox="0 0 24 24"><use href="#icon-logout"></use></svg>
      </button>
    </div>
  </header>

  <main>
    <section id="view-change-password" class="auth-wrap hidden">
      <div class="auth-card">
        <h2>Troque sua senha</h2>
        <p class="sub">É obrigatório definir uma nova senha antes de continuar.</p>
        <form id="form-change-password">
          <div class="field">
            <label for="cp-current">Senha atual</label>
            <input id="cp-current" type="password" required autocomplete="current-password">
          </div>
          <div class="field">
            <label for="cp-new">Nova senha (mínimo 10 caracteres)</label>
            <input id="cp-new" type="password" required minlength="10" autocomplete="new-password">
          </div>
          <p class="error-text" id="cp-error"></p>
          <button class="full" type="submit">Salvar nova senha</button>
        </form>
      </div>
    </section>

    <section id="view-board"></section>
    <section id="view-reports" class="hidden"></section>
    <section id="view-dashboard" class="hidden"></section>
    <section id="view-admin" class="hidden"></section>
  </main>

  <!-- Dialogos (usados apenas na visao propria; admin e somente leitura) -->
  <dialog id="dialog-recurring">
    <h2 id="dlg-rec-title">Recorrente</h2>
    <form id="form-recurring">
      <div class="field">
        <label for="rec-label">Rótulo</label>
        <input id="rec-label" type="text" required maxlength="200">
      </div>
      <div class="dialog-actions">
        <button type="button" class="danger hidden" id="rec-delete">Remover</button>
        <div class="spacer"></div>
        <button type="button" class="text" id="rec-cancel">Cancelar</button>
        <button type="submit">Salvar</button>
      </div>
    </form>
  </dialog>

  <dialog id="dialog-worklog">
    <h2 id="dlg-wl-title">Tarefa</h2>
    <form id="form-worklog">
      <div class="field">
        <label for="wl-title">Título</label>
        <input id="wl-title" type="text" required maxlength="200">
      </div>
      <div class="field">
        <label for="wl-desc">Descrição (uma linha)</label>
        <input id="wl-desc" type="text" maxlength="300">
      </div>
      <div class="field">
        <label for="wl-status">Status</label>
        <select id="wl-status">
          <option value="todo">A fazer</option>
          <option value="in_progress">Em andamento</option>
          <option value="blocked">Bloqueado</option>
          <option value="done">Concluído</option>
        </select>
      </div>
      <div class="field">
        <label for="wl-due">Previsão de conclusão</label>
        <input id="wl-due" type="date">
      </div>
      <div class="dialog-actions">
        <button type="button" class="danger hidden" id="wl-delete">Excluir</button>
        <div class="spacer"></div>
        <button type="button" class="text" id="wl-cancel">Cancelar</button>
        <button type="submit">Salvar</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="/js/app.js?v=2"></script>
  <script type="module" src="/js/pwa.js?v=2"></script>
</body>
</html>
