worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    server_tokens off;

    gzip            on;
    gzip_comp_level 6;
    gzip_types      text/css application/javascript application/json image/svg+xml
                    font/woff2 text/plain;

    server {
        listen 80;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # ---- Headers de seguranca (aplicados a todas as respostas) ----
        # CSP rigida: sem unsafe-inline / unsafe-eval. CSS e JS sao externos.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

        # ---- API -> backend (rede interna) ----
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Estaticos: revalidacao condicional (evita CSS/JS obsoleto no cache
        #      do navegador apos deploy). 'expires -1' gera 'Cache-Control: no-cache';
        #      como o nginx ja envia ETag/Last-Modified, o browser revalida e recebe
        #      304 quando nada mudou -- barato e sempre correto. Usa 'expires' (nao
        #      'add_header') justamente para NAO resetar os headers de seguranca
        #      herdados do server. ----
        location ~* \.(?:css|js|woff2|svg|png|webp|avif|ico)$ {
            expires -1;
            try_files $uri =404;
        }

        # ---- HTML / navegacao ----
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
