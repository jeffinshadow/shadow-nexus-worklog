services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    # Porta NAO exposta ao host: acessivel apenas na rede interna do compose.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-7}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      APP_TZ: ${APP_TZ:-America/Sao_Paulo}
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]
    # Nao exposto a internet: so o nginx (rede interna) fala com a API.

  web:
    build: ./web
    restart: unless-stopped
    depends_on: [backend]
    networks: [internal]
    # Sem ports: quem alcanca o nginx e apenas o tunnel, pela rede interna.

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on: [web]
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
